<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen dark:bg-white dark:text-black dark:border-black">

    <button class="Theme-toggle bg-white p-2 rounded-lg shadow-lg absolute top-4 right-4 cursor-pointer hover:bg-gray-200 transition-colors text-black font-bold" id="theme-btn">Light</button>

    <div class="container flex justify-center items-center h-screen">
        <div class="clock bg-white p-8 rounded-lg shadow-lg dark:bg-gray-900 dark:text-white dark:border-black">
            <div class="time flex justify-center items-center gap-4 text-black text-6xl font-bold dark:text-white dark:border-black">
                <span id="hours">00</span>
                <span>:</span>
                <span id="minutes">00</span>
                <span>:</span>
                <span id="seconds">00</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
